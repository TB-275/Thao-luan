<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="444.png" type="image/png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tổ thảo luận Đại Hội</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- BACKGROUND -->
  <div class="background"></div>

  <!-- LOADING -->
  <div id="loader">
    <div class="spinner"></div>
    <p>Đang tải hệ thống...</p>
  </div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <img src="444.png" alt="Logo">
    </div>
    <h1>THẢO LUẬN</h1>
    <h2>ĐẠI HỘI ĐẠI BIỂU HỘI LHTN VIỆT NAM</h2>
    <h3>THÀNH PHỐ ĐÀ NẴNG</h3>
    <h4>LẦN THỨ I, NHIỆM KÌ 2026 - 2029</h4>
    <!-- <p>Ghi nhận ý kiến đại biểu trực tuyến</p> -->
  </header>

  <main>
    <!-- GROUPS (Trang chủ: Danh sách các tổ) -->
    <section class="group-container hidden" id="groupContainer"></section>

    <!-- DISCUSSION (Phòng thảo luận của từng tổ) -->
    <section class="discussion hidden" id="discussion">
      <button class="back-btn" onclick="backHome()">← Quay lại chọn tổ</button>

      <!-- TOPIC -->
      <div class="topic-box">
        <div class="topic-header" onclick="toggleTopic()">
          <h2 id="groupTitle"></h2>
          <span id="topicArrow">▼</span>
        </div>
        <div class="topic-content hidden-topic" id="topicContent">
          <p id="groupTopic"></p>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-box">
        <div class="stat-card">
          <h3 id="totalMembers">0</h3>
          <p>Tổng đại biểu</p>
        </div>
        <div class="stat-card">
          <h3 id="doneMembers">0</h3>
          <p>Đã góp ý</p>
        </div>
        <div class="stat-card">
          <h3 id="pendingMembers">0</h3>
          <p>Chưa góp ý</p>
        </div>
      </div>

      <!-- FORM NHẬP Ý KIẾN -->
      <div class="form-box">
        <!-- <input type="text" id="searchInput" placeholder="🔍 Nhập tên để tìm kiếm" oninput="filterMembers()"> -->
        <select id="memberSelect"></select>
        <!-- <input type="text" id="guestNameInput" placeholder="Người ngoài danh sách: nhập họ tên tại đây"> -->
        <!-- <textarea id="commentInput" placeholder="Nhập nội dung ý kiến của bạn..."></textarea> -->
        <!-- <button onclick="submitComment()">GỬI Ý KIẾN</button> -->
      </div>

      <!-- PROGRESS -->
      <div class="progress-box">
        <h3>Tiến độ góp ý</h3>
        <div class="progress-bar">
          <div id="progressFill"></div>
        </div>
        <p id="progressText"></p>
        <div id="progressList"></div>
      </div>

      <!-- COMMENTS -->
      <div class="comment-box">
        <h3>Danh sách ý kiến đã gửi</h3>
        <div id="commentsList"></div>
      </div>
    </section>
  </main>

  <!-- THƯ VIỆN FIREBASE (Phiên bản 8 - Dễ dùng với HTML thuần) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- FILE JAVASCRIPT LOGIC CỦA BẠN -->
  <script src="script.js"></script>
</body>
</html>
